[build]
  publish = "."
  command = ""

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "development" }

[headers]
  [[headers.values]]
    key = "X-Content-Type-Options"
    value = "nosniff"

  [[headers.values]]
    key = "X-Frame-Options"
    value = "SAMEORIGIN"

  [[headers.values]]
    key = "X-XSS-Protection"
    value = "1; mode=block"

  [[headers.values]]
    key = "Referrer-Policy"
    value = "no-referrer-when-downgrade"